# =========================================
# NutriTrack — docker-compose
# Быстрый запуск: docker-compose up -d
# =========================================

services:
  nutritrack:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nutritrack
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Оптимизация: ограничиваем ресурсы
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 64M
    # Логи не захлёстывают диск
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # --- Dev-сервер (горячая перезагрузка) ---
  nutritrack-dev:
    image: node:20-alpine
    container_name: nutritrack-dev
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    command: sh -c "npm install && npm start"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"