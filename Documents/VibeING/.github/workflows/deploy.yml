# ═══════════════════════════════════════════════════
# VibeING CI/CD Pipeline
# Деплой 7 Next.js проектов на VPS сервер
# ═══════════════════════════════════════════════════

name: 🚀 VibeING Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # Ручной запуск

permissions:
  contents: read
  deployments: write

# ═══════════════════════════════════════════════════
# Конфигурация
# ═══════════════════════════════════════════════════
env:
  NODE_VERSION: '20'
  CACHE_KEY: vibeing-v1

jobs:
  # ─────────────────────────────────────────────────
  # STEP 1: Линтинг и проверка типов
  # ─────────────────────────────────────────────────
  lint:
    name: 🧹 Lint & Types
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install root dependencies
        run: npm ci --ignore-scripts || npm install --ignore-scripts
        working-directory: web-dev-landing
      
      - name: Check TypeScript (FinFlow)
        run: npx tsc --noEmit
        working-directory: web-dev-landing/finflow
      
      - name: Check TypeScript (MediCare)
        run: npx tsc --noEmit
        working-directory: web-dev-landing/medicare
      
      # Пропускаем остальные проекты если они не используют TS строго
      
  # ─────────────────────────────────────────────────
  # STEP 2: Smoke-тесты (локально)
  # ─────────────────────────────────────────────────
  smoke-tests:
    name: 🧪 Smoke Tests
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Run smoke tests (dry-run mode)
        run: |
          echo "Smoke tests require running servers - skipping in CI"
          echo "Run locally: .\\smoke-tests.ps1 или node smoke-tests.js"
      
  # ─────────────────────────────────────────────────
  # STEP 3: Build all projects (параллельно)
  # ─────────────────────────────────────────────────
  build:
    name: 🏗️ Build ${{ matrix.project }}
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        project:
          [finflow, medicare, greenmarket, foodhub, luxstay, artisan, metrics-dashboard]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'web-dev-landing/${{ matrix.project }}/package-lock.json'
      
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            web-dev-landing/${{ matrix.project }}/node_modules
            ~/.npm
          key: ${{ env.CACHE_KEY }}-${{ matrix.project }}-${{ hashFiles('web-dev-landing/${{ matrix.project }}/package-lock.json') }}
          restore-keys: |
            ${{ env.CACHE_KEY }}-${{ matrix.project }}-
      
      - name: Install dependencies
        run: |
          cd web-dev-landing/${{ matrix.project }}
          npm ci --ignore-scripts || npm install --ignore-scripts
        env:
          NODE_ENV: production
      
      - name: Build ${{ matrix.project }}
        run: |
          cd web-dev-landing/${{ matrix.project }}
          npm run build
        env:
          NODE_ENV: production
          NODE_OPTIONS: '--max-old-space-size=4096'
          DB_HOST: localhost
          DB_NAME: vibeing_finflow
          DB_USER: vibeing
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.project }}
          path: web-dev-landing/${{ matrix.project }}/.next
          retention-days: 1

  # ─────────────────────────────────────────────────
  # STEP 4: Подготовка деплой-архива
  # ─────────────────────────────────────────────────
  package:
    name: 📦 Package Deploy
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/builds
      
      - name: Create deploy archive
        run: |
          mkdir -p /tmp/vibeing-deploy
          cp -r /tmp/builds/build-*/.next /tmp/vibeing-deploy/
          echo "Built projects:"
          ls -la /tmp/vibeing-deploy/
        
      - name: Upload deploy package
        uses: actions/upload-artifact@v4
        with:
          name: vibeing-deploy-package
          path: /tmp/vibeing-deploy
          retention-days: 1

  # ─────────────────────────────────────────────────
  # STEP 5: Деплой на сервер
  # ─────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to ${{ secrets.DEPLOY_SERVER_IP }}
    needs: [package]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download deploy package
        uses: actions/download-artifact@v4
        with:
          name: vibeing-deploy-package
          path: /tmp/vibeing-deploy
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat > ~/.ssh/config << EOF
            Host deploy
              HostName ${{ secrets.DEPLOY_SERVER_IP }}
              User ${{ secrets.DEPLOY_SSH_USER }}
              IdentityFile ~/.ssh/deploy_key
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
              ConnectTimeout 10
          EOF
      
      - name: Deploy to server
        run: |
          echo "🚀 Deploying VibeING to server..."
          
          # Upload to server
          scp -r /tmp/vibeing-deploy/* \
            deploy:/opt/vibeing/
          
          # Execute deploy script on server
          ssh deploy << 'EOFSCRIPT'
            set -e
            cd /opt/vibeing
            
            echo "📦 Extracting build files..."
            
            # Restart services
            for dir in finflow medicare greenmarket foodhub luxstay artisan metrics-dashboard; do
              if [ -d "$dir/.next" ]; then
                echo "  🔄 Restarting $dir..."
                
                # Kill existing process on this port
                PORT=$(grep -r '"port":' "$dir/package.json" | head -1 | grep -o '[0-9]\+' || echo "3001")
                lsof -ti:$PORT | xargs kill -9 2>/dev/null || true
                sleep 2
                
                # Start new process
                cd "$dir"
                nohup npx next start -p $PORT > /var/log/vibeing/$dir.log 2>&1 &
                cd ..
                
                echo "  ✅ $dir restarted on port $PORT"
              else
                echo "  ⚠️  $dir - no .next directory found"
              fi
            done
          EOFSCRIPT
          
          echo "✅ Deployment complete!"
      
      - name: Health check (post-deploy)
        run: |
          echo "🏥 Checking deployed services..."
          
          declare -A PORTS=(
            [finflow]=3001
            [medicare]=3002
            [greenmarket]=3003
            [foodhub]=3004
            [luxstay]=3005
            [artisan]=3006
            [metrics-dashboard]=3099
          )
          
          for name in "${!PORTS[@]}"; do
            port="${PORTS[$name]}"
            echo -n "  $name (:$port)..."
            
            if curl -sf --max-time 5 "http://localhost:$port/health" > /dev/null 2>&1; then
              echo " ✅"
            else
              echo " ⚠️  (may need time to start)"
            fi
          done

  # ─────────────────────────────────────────────────
  # STEP 6: Уведомление (опционально)
  # ─────────────────────────────────────────────────
  notify:
    name: 🔔 Notification
    needs: [deploy]
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 2
    steps:
      - name: Deployment summary
        run: |
          echo "# 🚀 VibeING Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u +'%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Projects Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for project in finflow medicare greenmarket foodhub luxstay artisan metrics-dashboard; do
            echo "- ✅ $project" >> $GITHUB_STEP_SUMMARY
          done