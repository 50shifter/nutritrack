# Nginx reverse proxy for VibeING sites
# Proxies to SSH-tunneled local Next.js dev servers
# Install: cp vibe-ing.conf /etc/nginx/sites-available/vibe-ing && ln -s /etc/nginx/sites-available/vibe-ing /etc/nginx/sites-enabled/ && nginx -s reload

server {
    listen 3001;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

