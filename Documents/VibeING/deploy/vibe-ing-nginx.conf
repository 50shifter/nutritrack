# VibeING Landing Page — static Next.js export
server {
    listen 8080;
    server_name _;

    root /var/www/vibe-ing/out;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets for 30 days
    location ~* \.(css|js|mjs|woff2|woff|ttf|otf|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

