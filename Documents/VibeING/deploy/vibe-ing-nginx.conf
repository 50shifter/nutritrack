# ─── VibeING Landing Page — static Next.js export (8080) ──
server {
    listen 8080;
    server_name _;

    root /var/www/vibe-ing/out;
    index index.html;

    # Статический контент — максимальная защита
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:;" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets для производительности
    location ~* \.(css|js|mjs|woff2|woff|ttf|otf|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Защита от directory listing
    autoindex off;
}
