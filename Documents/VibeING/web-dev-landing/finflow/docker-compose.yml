version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vibeing-postgres
    environment:
      POSTGRES_USER: vibeing
      POSTGRES_PASSWORD: vibeing123
      POSTGRES_DB: vibeing_finflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibeing"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: